apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "air-rs.fullname" . }}
  labels:
    {{- include "air-rs.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "air-rs.selectorLabels" . | nindent 6 }}
