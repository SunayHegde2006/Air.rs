name: Release — Build Wheels and Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"   # git tag v0.2.0 && git push --tags

permissions:
  contents: read
  id-token: write   # OIDC trusted publisher — no PYPI_TOKEN needed

jobs:
  # ── Linux wheels (manylinux_2_28, x86_64) ───────────────────────────────────
  linux-x86:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          manylinux: 2_28
          args: --release --features python --out dist -i python3.11 python3.12 python3.13

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: dist/*.whl

  # ── Linux wheels (manylinux_2_28, aarch64) ──────────────────────────────────
  linux-aarch64:
    name: Linux (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU required for cross-compiling aarch64 on x86_64 runner
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          manylinux: 2_28
          args: --release --features python --out dist -i python3.11 python3.12 python3.13

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-aarch64
          path: dist/*.whl

  # ── macOS universal2 (arm64 + x86_64) ───────────────────────────────────────
  macos:
    name: macOS universal2
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: PyO3/maturin-action@v1
        with:
          target: universal2-apple-darwin
          args: --release --features python --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-universal2
          path: dist/*.whl

  # ── Windows x86_64 ───────────────────────────────────────────────────────────
  windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --features python --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: dist/*.whl

  # ── Source distribution ──────────────────────────────────────────────────────
  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Publish to PyPI via OIDC trusted publisher ───────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux-x86, linux-aarch64, macos, windows, sdist]
    environment:
      name: pypi
      url: https://pypi.org/project/air-rs/
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: List distribution files
        run: ls -lh dist/

      # One-time PyPI setup: pypi.org -> Your project -> Publishing -> Add publisher
      #   Repository owner : SunayHegde2006
      #   Repository name  : Air.rs
      #   Workflow filename: release.yml
      #   Environment      : pypi
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
